<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiedersehen · Isa + Louis + 🐶-Gang</title>
<meta property="og:title" content="Wiedersehen · Isa + Louis + 🐶-Gang">
<meta property="og:description" content="Countdown bis Donnerstag, 9. Juli · 19:00 Uhr">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --night-1:#241730;
    --night-2:#150d1e;
    --panel:#1b1426;
    --panel-edge:#332543;
    --card-top:#26202f;
    --card-bot:#1d1726;
    --seam:#0c0912;
    --amber:#f4b740;
    --amber-soft:#e9c98a;
    --cream:#f0e7da;
    --muted:#9a8bab;
    --ok:#67d19e;
    --blush:#f2a0b5;
    --h: clamp(76px, 24vw, 130px);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    min-height:100%;
    font-family:"JetBrains Mono", ui-monospace, monospace;
    color:var(--cream);
    background:
      radial-gradient(120% 90% at 50% 0%, var(--night-1) 0%, var(--night-2) 62%, #0d0813 100%);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:clamp(28px,5vh,52px);
    padding:clamp(28px,6vw,64px) 18px;
    text-align:center;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- Header ---------- */
  header{max-width:720px;}
  .eyebrow{
    margin:0 0 18px;
    font-size:.72rem;
    letter-spacing:.42em;
    text-transform:uppercase;
    color:var(--amber-soft);
    opacity:.85;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:.9em;
  }
  .eyebrow::before,.eyebrow::after{
    content:"";
    width:34px;height:1px;
    background:linear-gradient(90deg,transparent,var(--amber-soft));
    opacity:.6;
  }
  .eyebrow::before{transform:scaleX(-1);}
  h1{
    font-family:"Fraunces", Georgia, serif;
    font-weight:600;
    font-size:clamp(2.2rem,8.5vw,4.4rem);
    line-height:1.02;
    margin:0;
    letter-spacing:-.01em;
    background:linear-gradient(180deg,#fff6ea,#e7b96a);
    -webkit-background-clip:text;background-clip:text;
    color:transparent;
    text-shadow:0 0 40px rgba(244,183,64,.12);
  }
  .names{
    margin:18px 0 0;
    font-size:clamp(.9rem,3.4vw,1.15rem);
    letter-spacing:.16em;
    color:var(--muted);
  }
  .names b{color:var(--cream);font-weight:700;}
  .names .dogs{color:var(--blush);font-weight:700;}

  /* ---------- Board ---------- */
  .board{
    width:min(880px,100%);
    background:linear-gradient(180deg,#221930,#170f21);
    border:1px solid var(--panel-edge);
    border-radius:22px;
    padding:clamp(20px,4vw,34px) clamp(16px,4vw,38px) clamp(18px,3.4vw,28px);
    box-shadow:
      0 40px 90px -40px rgba(0,0,0,.85),
      inset 0 1px 0 rgba(255,255,255,.05);
    position:relative;
  }
  .board-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    padding-bottom:clamp(16px,3vw,24px);
    margin-bottom:clamp(18px,3.4vw,28px);
    border-bottom:1px dashed rgba(255,255,255,.09);
    font-size:.68rem;
    letter-spacing:.24em;
    text-transform:uppercase;
    color:var(--muted);
    flex-wrap:wrap;
  }
  .board-head .label{display:flex;align-items:center;gap:.7em;}
  .status{
    color:var(--ok);
    display:flex;align-items:center;gap:.6em;
  }
  .dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--ok);
    box-shadow:0 0 10px var(--ok);
    animation:pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* ---------- Clock ---------- */
  /* Mobile first: 2x2 Raster */
  .clock{
    display:grid;
    grid-template-columns:repeat(2,auto);
    justify-content:center;
    align-items:start;
    gap:20px 14px;
  }
  .group{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .cards{display:flex;gap:6px;}
  .unit{
    font-size:.62rem;
    letter-spacing:.28em;
    text-transform:uppercase;
    color:var(--muted);
  }

  .card{
    position:relative;
    width:calc(var(--h)*.66);
    height:var(--h);
    perspective:520px;
    font-family:"JetBrains Mono",monospace;
    font-weight:700;
  }
  .half{
    position:absolute;left:0;width:100%;
    height:calc(var(--h)/2);
    overflow:hidden;
    background:linear-gradient(180deg,var(--card-top),#221b2c);
  }
  .top,.flip-top{top:0;border-radius:12px 12px 0 0;}
  .bottom,.flip-bottom{
    top:calc(var(--h)/2);
    border-radius:0 0 12px 12px;
    background:linear-gradient(180deg,#211a2a,var(--card-bot));
  }
  .half .num{
    position:absolute;left:0;width:100%;
    height:var(--h);
    display:flex;align-items:center;justify-content:center;
    font-size:calc(var(--h)*.62);
    color:var(--amber);
    text-shadow:0 0 18px rgba(244,183,64,.35);
  }
  .top .num,.flip-top .num{top:0;}
  .bottom .num,.flip-bottom .num{top:calc(var(--h)/-2);}
  .card::before{ /* seam highlight */
    content:"";position:absolute;left:0;top:0;width:100%;height:100%;
    border-radius:12px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.06), inset 0 0 0 1px rgba(255,255,255,.03);
    pointer-events:none;z-index:8;
  }
  .card::after{ /* seam shadow line */
    content:"";position:absolute;left:0;top:calc(50% - 1px);
    width:100%;height:2px;background:var(--seam);z-index:6;
  }
  .flip-top,.flip-bottom{z-index:7;}
  .flip-top{transform-origin:bottom center;opacity:0;}
  .flip-bottom{transform-origin:top center;transform:rotateX(90deg);opacity:0;}
  .card.go .flip-top{opacity:1;animation:ftop .3s ease-in forwards;box-shadow:0 6px 12px rgba(0,0,0,.4);}
  .card.go .flip-bottom{opacity:1;animation:fbot .3s ease-out .3s forwards;}
  @keyframes ftop{from{transform:rotateX(0)}to{transform:rotateX(-90deg)}}
  @keyframes fbot{from{transform:rotateX(90deg)}to{transform:rotateX(0)}}

  /* ---------- Footer of board ---------- */
  .board-foot{
    margin-top:clamp(18px,3.4vw,26px);
    padding-top:clamp(16px,3vw,22px);
    border-top:1px dashed rgba(255,255,255,.09);
    display:flex;justify-content:center;align-items:center;
    gap:12px;flex-wrap:wrap;
    font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);
  }
  .board-foot .sched{color:var(--amber-soft);}

  .tagline{
    font-size:.85rem;
    letter-spacing:.05em;
    color:var(--muted);
    max-width:460px;
  }
  .tagline b{color:var(--blush);font-weight:500;}

  /* ---------- Music player ---------- */
  .player{
    display:flex;align-items:center;gap:14px;
    justify-content:center;
  }
  .play{
    width:58px;height:58px;flex:0 0 auto;
    border-radius:50%;
    border:1px solid var(--panel-edge);
    background:linear-gradient(180deg,#251b32,#160e21);
    color:var(--amber);
    cursor:pointer;
    display:grid;place-items:center;
    box-shadow:0 14px 30px -14px rgba(0,0,0,.8), inset 0 1px 0 rgba(255,255,255,.06);
    transition:border-color .2s ease, transform .12s ease, box-shadow .2s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .play:hover{border-color:var(--amber-soft);}
  .play:active{transform:scale(.94);}
  .play:focus-visible{outline:2px solid var(--amber-soft);outline-offset:3px;}
  .play svg{width:24px;height:24px;fill:currentColor;filter:drop-shadow(0 0 8px rgba(244,183,64,.35));}
  .ic-play{margin-left:2px;}      /* optisch zentrieren */
  .play .ic-pause{display:none;}
  .play.playing .ic-play{display:none;}
  .play.playing .ic-pause{display:block;}
  .play.playing{border-color:var(--amber-soft);box-shadow:0 0 0 4px rgba(244,183,64,.12), 0 14px 30px -14px rgba(0,0,0,.8);}
  .track{
    font-size:.72rem;letter-spacing:.24em;text-transform:uppercase;
    color:var(--muted);
  }

  .arrived{
    display:none;
    flex-direction:column;align-items:center;gap:14px;
    padding:clamp(20px,5vw,44px) 10px;
  }
  .arrived .big{
    font-family:"Fraunces",serif;font-weight:600;
    font-size:clamp(2rem,8vw,3.6rem);
    color:var(--amber);
    text-shadow:0 0 40px rgba(244,183,64,.35);
  }
  .arrived .sub{color:var(--cream);letter-spacing:.06em;}
  .arrived .paws{font-size:1.6rem;letter-spacing:.3em;}
  body.done .clock,body.done .board-foot{display:none;}
  body.done .arrived{display:flex;}
  body.done .status{color:var(--blush);}
  body.done .dot{background:var(--blush);box-shadow:0 0 10px var(--blush);}

  /* Erst wenn wirklich Platz ist: alle vier Gruppen in einer Reihe */
  @media (min-width:860px){
    :root{--h:112px;}
    .clock{grid-template-columns:repeat(4,auto);gap:24px clamp(18px,3vw,28px);}
  }
  @media (prefers-reduced-motion: reduce){
    .flip-top,.flip-bottom{display:none;}
    .dot{animation:none;}
  }
</style>
</head>
<body>

  <header>
    <h1>Camping&nbsp;Night<br>Countdown</h1>
    <p class="names"><b>Isa</b> · <b>Louis</b> · <span class="dogs">🐶-Gang</span></p>
  </header>

  <main class="board">
    <div class="board-head">
      <span class="label">◷ Ankunft in</span>
      <span class="status" id="status"><span class="dot"></span>Planmäßig</span>
    </div>

    <div class="clock" id="clock" aria-live="polite"></div>

    <div class="arrived" id="arrived">
      <div class="paws">🐾 🐾</div>
      <div class="big">Angekommen ♥</div>
      <div class="sub">Es ist so weit.</div>
    </div>

    <div class="board-foot">
      <span class="sched" id="sched">Do · 09. Juli · 19:00 CEST</span>
    </div>
  </main>

  <div class="player">
    <button id="playBtn" class="play" type="button" aria-label="Song abspielen">
      <svg class="ic-play" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
      <svg class="ic-pause" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
    </button>
    <span class="track">Our Song</span>
  </div>
  <audio id="audio" src="AmericanGirlsIsa.mp3" loop preload="none"></audio>
<script>
  // Ziel: Donnerstag, 9. Juli 2026, 19:00 Uhr CEST (UTC+2)
  const TARGET = new Date("2026-07-09T19:00:00+02:00").getTime();

  const groups = [
    {key:"d", label:"Tage"},
    {key:"h", label:"Stunden"},
    {key:"m", label:"Minuten"},
    {key:"s", label:"Sekunden"},
  ];

  const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const clock = document.getElementById("clock");
  const cardRefs = {};

  function makeCard(){
    const c = document.createElement("div");
    c.className = "card";
    c.dataset.val = "0";
    c.innerHTML =
      '<div class="half top"><span class="num">0</span></div>' +
      '<div class="half bottom"><span class="num">0</span></div>' +
      '<div class="half flip-top"><span class="num">0</span></div>' +
      '<div class="half flip-bottom"><span class="num">0</span></div>';
    return c;
  }

  groups.forEach(g=>{
    const grp = document.createElement("div");
    grp.className = "group";
    const cards = document.createElement("div");
    cards.className = "cards";
    const tens = makeCard(), ones = makeCard();
    cards.append(tens, ones);
    const unit = document.createElement("div");
    unit.className = "unit";
    unit.textContent = g.label;
    grp.append(cards, unit);
    clock.append(grp);
    cardRefs[g.key] = [tens, ones];
  });

  function setInstant(card, val){
    card.querySelectorAll(".num").forEach(n=>n.textContent = val);
    card.dataset.val = val;
  }

  function flipCard(card, newVal){
    const old = card.dataset.val;
    if(old === newVal) return;
    if(reduce){ setInstant(card, newVal); return; }
    card.querySelector(".top .num").textContent = newVal;
    card.querySelector(".bottom .num").textContent = old;
    card.querySelector(".flip-top .num").textContent = old;
    card.querySelector(".flip-bottom .num").textContent = newVal;
    card.classList.remove("go");
    void card.offsetWidth; // reflow, damit die Animation neu startet
    card.classList.add("go");
    card.dataset.val = newVal;
    clearTimeout(card._t);
    card._t = setTimeout(()=>{
      card.querySelector(".bottom .num").textContent = newVal;
      card.classList.remove("go");
    }, 640);
  }

  function setGroup(key, value){
    const s = String(value).padStart(2,"0");
    flipCard(cardRefs[key][0], s[0]);
    flipCard(cardRefs[key][1], s[1]);
  }

  let finished = false;
  function tick(){
    const diff = TARGET - Date.now();
    if(diff <= 0){
      if(!finished){
        finished = true;
        document.body.classList.add("done");
        document.getElementById("status").innerHTML = '<span class="dot"></span>Angekommen';
      }
      return;
    }
    const totalSec = Math.floor(diff/1000);
    setGroup("d", Math.floor(totalSec/86400));
    setGroup("h", Math.floor(totalSec%86400/3600));
    setGroup("m", Math.floor(totalSec%3600/60));
    setGroup("s", totalSec%60);
  }

  tick();
  setInterval(tick, 1000);

  // ---- Musik: Play / Pause ----
  const audio = document.getElementById("audio");
  const playBtn = document.getElementById("playBtn");
  playBtn.addEventListener("click", ()=>{
    if(audio.paused){
      audio.play().then(()=>{
        playBtn.classList.add("playing");
        playBtn.setAttribute("aria-label","Song pausieren");
      }).catch(()=>{
        playBtn.classList.remove("playing");
      });
    } else {
      audio.pause();
      playBtn.classList.remove("playing");
      playBtn.setAttribute("aria-label","Song abspielen");
    }
  });
  audio.addEventListener("ended", ()=>{
    playBtn.classList.remove("playing");
    playBtn.setAttribute("aria-label","Song abspielen");
  });
</script>
</body>
</html>
